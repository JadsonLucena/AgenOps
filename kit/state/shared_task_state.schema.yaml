title: Shared Task State Schema
type: object
required:
  - task_id
  - task_title
  - task_status
  - task_version
  - owner
  - objective
  - scope
  - requirements
  - architecture
  - artifacts
  - subagents
  - findings
  - risks
  - blockers
  - changelog
properties:
  task_id:
    type: string
    description: Stable identifier for the task or change set.
  task_title:
    type: string
    description: Short human-readable title.
  task_status:
    type: string
    enum: [planning, in_progress, blocked, review, done]
  task_version:
    type: integer
    minimum: 1
  owner:
    type: object
    required: [orchestrator, last_updated_by, last_updated_at]
    properties:
      orchestrator:
        type: string
      last_updated_by:
        type: string
      last_updated_at:
        type: string
        description: ISO 8601 timestamp with timezone.
  objective:
    type: object
    required: [summary, success_criteria]
    properties:
      summary:
        type: string
      success_criteria:
        type: array
        items:
          type: string
  scope:
    type: object
    required: [in_scope, out_of_scope]
    properties:
      in_scope:
        type: array
        items:
          type: string
      out_of_scope:
        type: array
        items:
          type: string
  requirements:
    type: object
    required: [approved, open_questions]
    properties:
      approved:
        type: array
        items:
          type: object
      open_questions:
        type: array
        items:
          type: object
  architecture:
    type: object
    required: [decisions, constraints]
    properties:
      decisions:
        type: array
        items:
          type: object
      constraints:
        type: array
        items:
          type: string
  artifacts:
    type: object
    additionalProperties: true
  subagents:
    type: object
    required: [queue]
    properties:
      queue:
        type: array
        items:
          type: object
  findings:
    type: object
    required: [open, resolved]
    properties:
      open:
        type: array
        items:
          type: object
      resolved:
        type: array
        items:
          type: object
  risks:
    type: array
    items:
      type: object
  blockers:
    type: array
    items:
      type: object
  changelog:
    type: array
    items:
      type: object
  context:
    type: object
    properties:
      context_budget_tokens:
        type: integer
        minimum: 1
      estimated_context_tokens:
        type: integer
        minimum: 0
      context_budget_ratio:
        type: number
        minimum: 0
      context_status:
        type: string
        enum: [healthy, warning, compact_now, exceeded]
      context_snapshot_version:
        type: integer
        minimum: 0
      context_snapshot_path:
        type: string
      context_summary_path:
        type: string
      last_compacted_at:
        type: string
        description: ISO 8601 timestamp with timezone.
additionalProperties: false
